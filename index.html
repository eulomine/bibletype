<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>✝ 말씀 타이핑 — 교회 타자연습</title>
<style>
:root {
  --color-bg: #0f0e17;
  --color-surface: #1a1932;
  --color-surface2: #232146;
  --color-primary: #e94560;
  --color-accent: #ffd700;
  --color-text: #ececec;
  --color-text-dim: #9a98ae;
  --color-success: #2ecc71;
  --color-danger: #e74c3c;
  --color-info: #3498db;
  --game-width: 900px;
  --game-ratio: 62.5%;
  --font-main: 'Segoe UI','Malgun Gothic','맑은 고딕',sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 8px 32px rgba(0,0,0,0.5);
  --transition: 0.22s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-main);background:var(--color-bg);color:var(--color-text);display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:12px;overflow-x:hidden}

/* 게임 중 body 스크롤 방지 */
body.game-active{overflow:hidden;position:fixed;width:100%;height:100%}

#app{width:100%;max-width:var(--game-width);display:flex;flex-direction:column;gap:10px}

/* 게임 중: 화면 꽉 채우기 */
.game-running{height:100vh;height:100dvh;gap:6px!important}

/* ── 헤더 ── */
.header{text-align:center;padding:16px 12px 12px;background:linear-gradient(135deg,var(--color-surface),#0f3460);border-radius:var(--radius);box-shadow:var(--shadow)}
.header h1{font-size:1.65rem;margin-bottom:3px;background:linear-gradient(90deg,var(--color-accent),#ff9a56,var(--color-primary));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
.header .verse{font-size:.82rem;color:var(--color-text-dim);font-style:italic}

/* ── 난이도 바 ── */
.difficulty-bar{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.diff-btn{flex:1 1 0;min-width:90px;padding:9px 4px;border:2px solid rgba(255,255,255,.08);border-radius:var(--radius-sm);background:var(--color-surface);color:var(--color-text);font-size:.82rem;font-weight:700;cursor:pointer;transition:var(--transition);text-align:center;line-height:1.25;font-family:var(--font-main)}
.diff-btn span.label{display:block;font-size:.9rem}
.diff-btn span.sub{display:block;font-size:.65rem;color:var(--color-text-dim);font-weight:400;margin-top:2px}
.diff-btn:hover{border-color:var(--color-primary);transform:translateY(-1px)}
.diff-btn.active{border-color:var(--color-accent);background:linear-gradient(135deg,rgba(233,69,96,.12),rgba(255,215,0,.10));box-shadow:0 0 14px rgba(255,215,0,.2)}
.diff-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── 상태 바 ── */
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--color-surface);border-radius:var(--radius);font-size:.88rem;flex-wrap:wrap;gap:6px}
.stat{display:flex;align-items:center;gap:4px;white-space:nowrap}
.stat .icon{font-size:1rem}
.stat .val{font-weight:700;min-width:20px}
.stat .val.score-val{color:var(--color-accent)}
.stat .val.combo-val{color:var(--color-primary)}
.stat .val.miss-val{color:var(--color-danger)}
.hearts{letter-spacing:2px;font-size:1.05rem}

/* ── 게임 영역 ── */
.game-container{position:relative;width:100%;padding-top:var(--game-ratio);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);background:#080810}

/* 게임 중: 남은 공간 꽉 채우기 */
.game-running .game-container{flex:1;padding-top:0}

.game-area{position:absolute;inset:0;background:url('https://www.dropbox.com/scl/fi/5v49jobvr49qtognpngjb/background-church.png?rlkey=doov91nti27jnmito24hc2f21&st=450qi53g&raw=1') center/cover no-repeat;image-rendering:pixelated}
.game-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.25) 0%,rgba(0,0,0,.45) 100%)}
.word-zone{position:absolute;inset:0;overflow:hidden}

.start-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;background:rgba(0,0,0,.55);z-index:5;text-align:center;gap:10px}
.start-overlay.hidden{display:none}
.start-overlay .big-text{font-size:1.5rem;font-weight:800;color:var(--color-accent)}
.start-overlay .small-text{font-size:.9rem;color:var(--color-text-dim)}

/* ── 단어 노드 ── */
.word-node{position:absolute;padding:4px 13px;border-radius:20px;font-weight:700;font-size:1rem;white-space:nowrap;text-shadow:1px 1px 3px rgba(0,0,0,.8);pointer-events:none;will-change:top,left}
.word-node.normal{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.word-node.bonus{background:linear-gradient(135deg,rgba(255,215,0,.25),rgba(233,69,96,.25));color:var(--color-accent);border:1px solid rgba(255,215,0,.6);animation:glow 1s ease-in-out infinite alternate}
@keyframes glow{from{box-shadow:0 0 4px rgba(255,215,0,.3)}to{box-shadow:0 0 16px rgba(255,215,0,.7)}}
.word-node.matched{animation:pop .3s ease forwards}
@keyframes pop{0%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.6}100%{transform:scale(0);opacity:0}}
.word-node.missed{animation:fall-out .25s ease forwards}
@keyframes fall-out{to{opacity:0;transform:translateY(15px) scale(.8)}}
.float-score{position:absolute;font-weight:900;font-size:1.1rem;pointer-events:none;animation:float-up .7s ease forwards;z-index:10;text-shadow:0 0 6px rgba(0,0,0,.5)}
@keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}

/* ── 입력 ── */
.input-area{display:flex;gap:6px;align-items:center}
#typing-input{flex:1;padding:11px 16px;border:2px solid rgba(255,255,255,.1);border-radius:var(--radius);background:var(--color-surface);color:var(--color-text);font-size:1.15rem;font-family:var(--font-main);outline:none;transition:var(--transition)}
#typing-input:focus{border-color:var(--color-accent);box-shadow:0 0 12px rgba(255,215,0,.2)}
#typing-input::placeholder{color:#555}
.btn-icon{width:42px;height:42px;border:none;border-radius:50%;background:var(--color-surface);color:var(--color-text);font-size:1.1rem;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-icon:hover{background:var(--color-surface2)}

/* ── 컨트롤 ── */
.control-bar{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.ctrl-btn{padding:9px 20px;border:none;border-radius:var(--radius-sm);font-size:.88rem;font-weight:700;cursor:pointer;transition:var(--transition);font-family:var(--font-main)}
.ctrl-btn.start{background:var(--color-success);color:#fff}.ctrl-btn.start:hover{background:#27ae60}
.ctrl-btn.pause{background:var(--color-info);color:#fff}.ctrl-btn.pause:hover{background:#2980b9}
.ctrl-btn.stop{background:var(--color-danger);color:#fff}.ctrl-btn.stop:hover{background:#c0392b}
.ctrl-btn.rank{background:var(--color-accent);color:#1a1a2e}.ctrl-btn.rank:hover{background:#e6c200}
.ctrl-btn.secondary{background:var(--color-surface2);color:var(--color-text)}.ctrl-btn.secondary:hover{background:#2d2b52}
.ctrl-btn:disabled{opacity:.35;cursor:not-allowed}

/* ── 게임 중 숨김 ── */
.hide-in-game{transition:all .25s ease}
.game-running .hide-in-game{opacity:0;pointer-events:none;height:0;overflow:hidden;margin:0;padding:0;border:0;min-height:0}

/* ── 배너 ── */
.verse-banner{text-align:center;padding:9px 12px;font-style:italic;color:var(--color-text-dim);font-size:.78rem;background:var(--color-surface);border-radius:var(--radius);line-height:1.5}

/* ── 모달 ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;justify-content:center;align-items:center;padding:16px}
.modal-backdrop.show{display:flex}
.modal{background:var(--color-surface);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);padding:26px 28px;max-width:460px;width:100%;box-shadow:var(--shadow);text-align:center;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.3rem;margin-bottom:12px;color:var(--color-accent)}
.modal p{margin-bottom:8px;color:var(--color-text-dim);font-size:.92rem}
.modal .big-score{font-size:2.6rem;font-weight:900;color:var(--color-accent);margin:10px 0}
.modal .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.modal .sg-item{padding:6px 10px;background:rgba(255,255,255,.04);border-radius:6px;font-size:.82rem;display:flex;justify-content:space-between;align-items:center}
.modal .sg-label{color:var(--color-text-dim)}
.modal .sg-val{font-weight:700}
.modal input[type="text"]{width:100%;padding:10px 14px;border:2px solid rgba(255,255,255,.1);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);color:var(--color-text);font-size:1rem;margin:8px 0;outline:none;font-family:var(--font-main)}
.modal input[type="text"]:focus{border-color:var(--color-accent)}
.modal-actions{display:flex;gap:8px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.modal-actions .ctrl-btn{min-width:90px}

.ranking-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:.8rem}
.ranking-table th{background:rgba(255,215,0,.1);padding:7px 4px;text-align:center;color:var(--color-accent);font-size:.75rem}
.ranking-table td{padding:6px 4px;text-align:center;border-bottom:1px solid rgba(255,255,255,.04)}
.ranking-table tr:hover td{background:rgba(255,255,255,.02)}
.ranking-filter{display:flex;gap:4px;justify-content:center;margin-bottom:8px;flex-wrap:wrap}
.ranking-filter button{padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:transparent;color:var(--color-text-dim);font-size:.72rem;cursor:pointer;transition:var(--transition);font-family:var(--font-main)}
.ranking-filter button.active,.ranking-filter button:hover{border-color:var(--color-accent);color:var(--color-accent);background:rgba(255,215,0,.06)}
.ranking-loading{padding:20px;color:var(--color-text-dim);font-size:.85rem}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.shake{animation:shake .25s ease}

/* ── 반응형 ── */
@media(max-width:640px){
  body{padding:6px}
  .header h1{font-size:1.2rem}
  .diff-btn{min-width:70px;padding:7px 3px;font-size:.72rem}
  .diff-btn span.label{font-size:.78rem}
  .status-bar{font-size:.76rem;padding:7px 10px}
  #typing-input{font-size:1rem;padding:10px 12px}
  .word-node{font-size:.85rem;padding:3px 10px}
  .ctrl-btn{padding:8px 14px;font-size:.8rem}
  .modal{padding:20px 16px}
  .modal .big-score{font-size:2rem}
}
@media(max-width:400px){
  .diff-btn span.sub{display:none}
  .stat .icon{display:none}
}
</style>
</head>
<body>
<div id="app">
  <header class="header hide-in-game">
    <h1>✝ 말씀 타이핑 ✝</h1>
    <p class="verse" id="headerVerse">"태초에 말씀이 계시니라" — 요한복음 1:1</p>
  </header>

  <nav class="difficulty-bar hide-in-game" role="group" aria-label="난이도 선택">
    <button class="diff-btn active" data-level="kids"><span class="label">유년꿈터</span><span class="sub">가운데줄 · ★☆☆☆☆</span></button>
    <button class="diff-btn" data-level="elem"><span class="label">초등꿈터</span><span class="sub">전체자판 · ★★☆☆☆</span></button>
    <button class="diff-btn" data-level="junior"><span class="label">소년꿈터</span><span class="sub">Shift추가 · ★★★☆☆</span></button>
    <button class="diff-btn" data-level="youth"><span class="label">청소년부</span><span class="sub">빠른속도 · ★★★★☆</span></button>
    <button class="diff-btn" data-level="adult"><span class="label">교구국</span><span class="sub">고난이도 · ★★★★★</span></button>
  </nav>

  <div class="status-bar" role="status" aria-live="polite">
    <div class="stat"><span class="icon">🏆</span><span>점수</span><span class="val score-val" id="scoreVal">0</span></div>
    <div class="stat"><span class="icon">🔥</span><span>콤보</span><span class="val combo-val" id="comboVal">0</span></div>
    <div class="stat"><span class="icon">❌</span><span>실수</span><span class="val miss-val" id="missVal">0</span></div>
    <div class="stat"><span class="icon">💖</span><span class="hearts" id="livesVal">♥♥♥♥♥</span></div>
    <div class="stat"><span class="icon">⏱</span><span class="val" id="timeVal">0초</span></div>
  </div>

  <div class="game-container" id="gameContainer">
    <div class="game-area" role="img" aria-label="교회 배경">
      <div class="game-overlay"></div>
      <div class="word-zone" id="wordZone"></div>
      <div class="start-overlay" id="startOverlay">
        <div class="big-text">✝ 말씀 타이핑 ✝</div>
        <div class="small-text">난이도를 선택하고 [시작] 버튼을 눌러주세요</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input type="text" id="typing-input" placeholder="단어 입력 후 Enter ↵" autocomplete="off" aria-label="단어 입력" disabled>
    <button class="btn-icon" id="btnFullscreen" title="전체화면 (F키)" aria-label="전체화면">⛶</button>
    <button class="btn-icon" id="btnSound" title="효과음 토글" aria-label="효과음">🔊</button>
  </div>

  <div class="control-bar">
    <button class="ctrl-btn start hide-in-game" id="btnStart">▶ 시작</button>
    <button class="ctrl-btn pause" id="btnPause" disabled>⏸ 일시정지</button>
    <button class="ctrl-btn stop" id="btnStop" disabled>■ 중지</button>
    <button class="ctrl-btn rank hide-in-game" id="btnRanking">🏅 랭킹</button>
  </div>

  <div class="verse-banner hide-in-game" id="verseBanner">"모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니" — 디모데후서 3:16</div>
</div>

<!-- 게임오버 모달 -->
<div class="modal-backdrop" id="modalGameover">
  <div class="modal" role="dialog" aria-modal="true">
    <h2>🙏 게임 종료</h2>
    <p id="goMessage">수고하셨습니다!</p>
    <div class="big-score" id="goScore">0</div>
    <div class="stats-grid" id="goStats"></div>
    <input type="text" id="goNickname" placeholder="닉네임 입력 (최대 8자)" maxlength="8">
    <div class="modal-actions">
      <button class="ctrl-btn start" id="goSave">💾 저장 & 랭킹보기</button>
      <button class="ctrl-btn secondary" id="goRestart">🔄 재시작</button>
      <button class="ctrl-btn rank" id="goRanking">🏅 랭킹</button>
    </div>
  </div>
</div>

<!-- 랭킹 모달 -->
<div class="modal-backdrop" id="modalRanking">
  <div class="modal" role="dialog" aria-modal="true" style="max-width:540px">
    <h2>🏅 랭킹 TOP 10</h2>
    <div class="ranking-filter" id="rkFilter"></div>
    <div id="rkTableWrap"></div>
    <div class="modal-actions">
      <button class="ctrl-btn stop" id="rkClose">닫기</button>
    </div>
  </div>
</div>

/* ── 유년꿈터 가운데줄 검증 ── */
(()=>{
  const homeCho=new Set(['ㅁ','ㄴ','ㅇ','ㄹ','ㅎ']);
  const homeJung=new Set(['ㅗ','ㅓ','ㅏ','ㅣ','ㅘ','ㅚ']);
  const choL=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const jungL=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const jongL=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  function ok(w){
    for(const ch of w){
      const c=ch.charCodeAt(0);
      if(c<0xAC00||c>0xD7A3)return false;
      const o=c-0xAC00;
      if(!homeCho.has(choL[Math.floor(o/588)]))return false;
      if(!homeJung.has(jungL[Math.floor((o%588)/28)]))return false;
      const j=jongL[o%28];
      if(j&&!homeCho.has(j))return false;
    }
    return true;
  }
  WORD_BANK.kids.normal=WORD_BANK.kids.normal.filter(ok);
  WORD_BANK.kids.bonus=WORD_BANK.kids.bonus.filter(ok);
})();

let actx=null;
function ac(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function tn(f,d,t='sine',v=.12){if(!S.soundOn)return;try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function sfxOk(){tn(880,.1);setTimeout(()=>tn(1100,.1,undefined,.08),50)}
function sfxBonus(){tn(1200,.08);setTimeout(()=>tn(1500,.08),60);setTimeout(()=>tn(1800,.1),120)}
function sfxMiss(){tn(220,.2,'sawtooth',.08)}

/* ════════ 6. 유틸 ════════ */
const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const randf=(a,b)=>Math.random()*(b-a)+a;
const pick=a=>a[rand(0,a.length-1)];

function spawnWord(){
  if(!S.running||S.paused)return;
  const cfg=DIFF[S.level],bank=WORD_BANK[S.level];
  if(!bank.normal.length)return;
  const isB=Math.random()<.10&&bank.bonus.length>0;
  const text=pick(isB?bank.bonus:bank.normal);
  const el=document.createElement('div');
  el.className='word-node '+(isB?'bonus':'normal');
  el.textContent=text;
  wordZone.appendChild(el);
  const zW=wordZone.clientWidth,zH=wordZone.clientHeight;
  const elW=el.offsetWidth,elH=el.offsetHeight;
  const startX=zW*MOUTH_X-elW/2+randf(-30,30);
  const startY=zH*MOUTH_Y-elH/2;
  const vx=randf(-cfg.vxRange,cfg.vxRange);
  const vy=cfg.initVy+randf(-0.3,0.3);
  const w={id:S.nextId++,text,isBonus:isB,el,x:startX,y:startY,vx,vy,elW};
  el.style.left=w.x+'px';el.style.top=w.y+'px';
  S.words.push(w);
}
function removeWord(w,cls){
  w.el.classList.add(cls);const i=S.words.indexOf(w);if(i!==-1)S.words.splice(i,1);
  setTimeout(()=>{if(w.el.parentNode)w.el.remove()},400);
}
function showFloat(x,y,pts,isB){
  const el=document.createElement('div');el.className='float-score';
  el.textContent='+'+pts;el.style.left=x+'px';el.style.top=y+'px';
  el.style.color=isB?'var(--color-accent)':'var(--color-success)';
  wordZone.appendChild(el);setTimeout(()=>{if(el.parentNode)el.remove()},750);
}

/* ════════ 9. 게임 루프 ════════ */
function loop(ts){
  if(!S.running||S.paused)return;
  if(!S.lastFrame)S.lastFrame=ts;
  const dt=ts-S.lastFrame;S.lastFrame=ts;S.elapsed+=dt;
  const cfg=DIFF[S.level];
  const zW=wordZone.clientWidth,zH=wordZone.clientHeight;
  S.speedMul=Math.min(cfg.maxSpeedMul,1+(S.elapsed/1000)*cfg.speedUp);
  const grav=cfg.gravity*S.speedMul;
  const dtN=dt/16;
  for(let i=S.words.length-1;i>=0;i--){
    const w=S.words[i];
    w.vy+=grav*dtN;w.y+=w.vy*dtN;w.x+=w.vx*dtN;
    if(w.x<0){w.x=0;w.vx=Math.abs(w.vx)}
    if(w.x>zW-w.elW){w.x=zW-w.elW;w.vx=-Math.abs(w.vx)}
    w.el.style.left=w.x+'px';w.el.style.top=w.y+'px';
    if(w.y>zH){
      S.lives--;S.combo=0;S.misses++;sfxMiss();
      gameContainer.classList.add('shake');setTimeout(()=>gameContainer.classList.remove('shake'),280);
      removeWord(w,'missed');updateUI();
      if(S.lives<=0){endGame();return}
    }
  }
  updateUI();S.animFrame=requestAnimationFrame(loop);
}

/* ════════ 10. 입력 (엔터로만 확인) ════════ */
function onInput(){
  const v=typingInput.value.trim();
  if(!v){typingInput.value='';return}
  let m=null;
  for(const w of S.words){if(w.text===v&&(!m||w.y>m.y))m=w}
  if(m){
    const cfg=DIFF[S.level];
    S.combo++;if(S.combo>S.maxCombo)S.maxCombo=S.combo;
    const cm=1+Math.floor(S.combo/5)*0.5;
    let pts=Math.round(cfg.baseScore*cm);
    if(m.isBonus){pts*=cfg.bonusMul;S.bonusCleared++;sfxBonus()}else{sfxOk()}
    S.score+=pts;S.wordsCleared++;
    showFloat(m.x,m.y,pts,m.isBonus);
    removeWord(m,'matched');updateUI();
  }
  typingInput.value='';
}
/* 엔터로만 확인, ESC로 지우기 */
typingInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();onInput()}
  if(e.key==='Escape'){typingInput.value=''}
});

function initGame(){
  wordZone.innerHTML='';clearInterval(S.spawnTimer);cancelAnimationFrame(S.animFrame);

  Object.assign(S,{running:true,paused:false,score:0,combo:0,maxCombo:0,misses:0,
    lives:cfg.lives,maxLives:cfg.lives,wordsCleared:0,bonusCleared:0,elapsed:0,

  $$('.diff-btn').forEach(b=>b.disabled=true);

const LK='church_typing_rankings';
function ldLocal(){try{return JSON.parse(localStorage.getItem(LK))||{}}catch{return{}}}
function svLocal(lv,e){const a=ldLocal();if(!a[lv])a[lv]=[];a[lv].push(e);a[lv].sort((x,y)=>y.score-x.score);a[lv]=a[lv].slice(0,10);localStorage.setItem(LK,JSON.stringify(a))}
async function fbPost(p,d){const r=await fetch(`${FIREBASE_DB_URL}/${p}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});return r.ok}
async function fbGet(p){const r=await fetch(`${FIREBASE_DB_URL}/${p}.json`);if(!r.ok)return null;return r.json()}
async function saveRank(nick){
  const sec=Math.floor(S.elapsed/1000);
  const acc=(S.wordsCleared+S.misses)>0?Math.round((S.wordsCleared/(S.wordsCleared+S.misses))*100):0;
  const e={nickname:nick,score:S.score,words:S.wordsCleared,combo:S.maxCombo,accuracy:acc,time:sec,level:S.level,timestamp:new Date().toISOString()};
  svLocal(S.level,e);
  if(useFirebase){try{await fbPost(`rankings/${S.level}`,e)}catch(er){console.warn('Firebase 저장 실패:',er)}}
}
async function ldRanks(lv){
  if(useFirebase){try{
    const p=lv==='all'?'rankings':`rankings/${lv}`;const d=await fbGet(p);
    if(d){let r=[];if(lv==='all'){for(const k of Object.keys(d)){const es=d[k];for(const ek of Object.keys(es))r.push({...es[ek],level:k})}}
    else{for(const k of Object.keys(d))r.push({...d[k],level:lv})}r.sort((a,b)=>b.score-a.score);return r.slice(0,10)}
  }catch(e){console.warn('Firebase 로드 실패:',e)}}
  const a=ldLocal();let r=[];
  if(lv==='all'){for(const k of Object.keys(a))(a[k]||[]).forEach(x=>r.push({...x,level:k}))}
  else{r=(a[lv]||[]).map(x=>({...x,level:lv}))}
  r.sort((a,b)=>b.score-a.score);return r.slice(0,10);
}
async function showRK(fl){
  const lvs=['kids','elem','junior','youth','adult'];
  rkFilter.innerHTML='';
  ['all',...lvs].forEach(lv=>{const b=document.createElement('button');b.textContent=lv==='all'?'전체':LABELS[lv];b.className=fl===lv?'active':'';b.addEventListener('click',()=>showRK(lv));rkFilter.appendChild(b)});
  rkWrap.innerHTML='<div class="ranking-loading">불러오는 중...</div>';
  modalRK.classList.add('show');
  const rows=await ldRanks(fl);
  let h='<table class="ranking-table"><thead><tr><th>#</th><th>닉네임</th><th>난이도</th><th>점수</th><th>단어</th><th>콤보</th><th>정확도</th><th>날짜</th></tr></thead><tbody>';
  if(!rows.length)h+='<tr><td colspan="8" style="color:#555;padding:20px">기록이 없습니다</td></tr>';
  else rows.forEach((r,i)=>{const md=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);const d=r.timestamp?new Date(r.timestamp):null;const ds=d?`${d.getFullYear().toString().slice(2)}.${d.getMonth()+1}.${d.getDate()}`:'-';
    h+=`<tr><td>${md}</td><td>${esc(r.nickname||'익명')}</td><td>${LABELS[r.level]||r.level}</td><td style="font-weight:700;color:var(--color-accent)">${r.score}</td><td>${r.words}</td><td>${r.combo}</td><td>${r.accuracy}%</td><td>${ds}</td></tr>`});
  h+='</tbody></table>';
  if(!useFirebase)h+='<p style="font-size:.7rem;color:#555;margin-top:6px">📌 로컬 저장 모드 (Firebase 미연결)</p>';
  rkWrap.innerHTML=h;
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
rkClose.addEventListener('click',()=>modalRK.classList.remove('show'));

/* ════════ 14. 이벤트 ════════ */
document.querySelector('.difficulty-bar').addEventListener('click',e=>{const b=e.target.closest('.diff-btn');if(!b||b.disabled)return;S.level=b.dataset.level;updateDiff()});
btnStart.addEventListener('click',initGame);
btnPause.addEventListener('click',pauseGame);
btnStop.addEventListener('click',stopGame);
btnRanking.addEventListener('click',()=>showRK('all'));
function toggleFS(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{})}
btnFullscreen.addEventListener('click',toggleFS);
btnSound.addEventListener('click',()=>{S.soundOn=!S.soundOn;btnSound.textContent=S.soundOn?'🔊':'🔇'});
document.addEventListener('keydown',e=>{
  if((e.key==='f'||e.key==='F')&&document.activeElement!==typingInput)toggleFS();
  if(e.key==='Escape'){if(modalGO.classList.contains('show'))return;if(modalRK.classList.contains('show')){modalRK.classList.remove('show');return}if(document.fullscreenElement)document.exitFullscreen().catch(()=>{})}
});
modalRK.addEventListener('click',e=>{if(e.target===modalRK)modalRK.classList.remove('show')});
updateUI();updateDiff();
})();
</script>
</body>
</html>
