<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>✝ 말씀 타이핑 — 교회 타자연습</title>
<style>
/* ===== CSS Variables ===== */
:root{
  --color-bg:#0f0e17;
  --color-surface:#1a1932;
  --color-surface2:#252344;
  --color-primary:#e94560;
  --color-accent:#ffd700;
  --color-success:#2ecc71;
  --color-danger:#e74c3c;
  --color-text:#ececec;
  --color-muted:#8888aa;
  --radius:10px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
  --font-main:'Segoe UI','Malgun Gothic','맑은 고딕',sans-serif;
  --transition:all .25s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-main);background:var(--color-bg);color:var(--color-text);}

/* ===== Layout ===== */
#app{ display:flex; width:100%; height:100%; flex-direction:row; }

.game-panel{ flex:1; display:flex; flex-direction:column; position:relative; min-width:0; height:100%; }
.game-area{ flex:1; position:relative; background:url('https://www.dropbox.com/scl/fi/5v49jobvr49qtognpngjb/background-church.png?rlkey=doov91nti27jnmito24hc2f21&st=450qi53g&raw=1') center center/cover no-repeat; overflow:hidden; }
.game-overlay{ position:absolute;inset:0; background:linear-gradient(180deg,rgba(15,14,23,.15) 0%,rgba(15,14,23,.35) 100%); pointer-events:none;z-index:1; }
.word-zone{position:absolute;inset:0;z-index:2;}

.status-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:center;gap:18px;
  padding:8px 12px; background:rgba(15,14,23,.7);
  backdrop-filter:blur(6px); z-index:10; font-size:14px; flex-wrap:wrap;
}
.stat{display:flex;align-items:center;gap:4px;}
.stat .val{font-weight:700;color:var(--color-accent);min-width:28px;text-align:center;}
.stat .lives-display{letter-spacing:2px;font-size:15px;}

.input-bar{ display:flex;align-items:center;gap:8px; padding:8px 12px; background:var(--color-surface); border-top:2px solid var(--color-surface2); }
.input-bar input{
  flex:1; padding:10px 14px; border:2px solid var(--color-surface2); border-radius:var(--radius);
  background:var(--color-bg); color:var(--color-text); font-size:16px; outline:none; transition:var(--transition);
}
.input-bar input:focus{border-color:var(--color-primary);}
.btn-icon{ width:40px;height:40px; border:none;border-radius:var(--radius); background:var(--color-surface2); color:var(--color-text); font-size:18px;cursor:pointer; transition:var(--transition); flex-shrink:0; }
.btn-icon:hover{background:var(--color-primary);}

.side-panel{ width:300px; display:flex;flex-direction:column; background:var(--color-surface); border-left:2px solid var(--color-surface2); height:100%; overflow-y:auto; }
.side-header{ padding:16px;text-align:center; background:var(--color-surface2); }
.side-header h1{font-size:20px;color:var(--color-accent);}

.diff-section{padding:12px;}
.diff-btn{
  display:block;width:100%; padding:10px;margin-bottom:6px; border:2px solid var(--color-surface2);
  border-radius:var(--radius); background:var(--color-bg); color:var(--color-text); cursor:pointer; text-align:left; transition:var(--transition);
}
.diff-btn .label{font-weight:700;font-size:14px;}
.diff-btn .sub{display:block;font-size:11px;color:var(--color-muted);margin-top:2px;}
.diff-btn.active{border-color:var(--color-primary);background:rgba(233,69,96,.15);}

.ctrl-section{padding:12px;display:flex;flex-direction:column;gap:8px;}
.ctrl-btn{ padding:12px;border:none;border-radius:var(--radius); font-size:15px;font-weight:700;cursor:pointer; transition:var(--transition); }
.ctrl-btn.start{background:var(--color-primary);color:#fff;}
.ctrl-btn.rank{background:var(--color-surface2);color:var(--color-accent);}

.word-node{
  position:absolute; padding:4px 12px; border-radius:20px; font-weight:700; font-size:16px;
  white-space:nowrap; pointer-events:none; z-index:5; background:rgba(255,255,255,.92); color:#1a1932; box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.word-node.bonus{ background:linear-gradient(135deg,#ffd700,#ffaa00); animation:glow 1s ease-in-out infinite alternate; }
@keyframes glow{ from{box-shadow:0 0 6px rgba(255,215,0,.6);} to{box-shadow:0 0 18px rgba(255,215,0,.9);} }

.start-overlay, .pause-overlay{
  position:absolute;inset:0;z-index:30; display:flex;flex-direction:column; justify-content:center;align-items:center;
  background:rgba(15,14,23,.75); backdrop-filter:blur(4px);
}
.start-overlay.hidden{display:none;}
.pause-overlay{display:none;}
.pause-overlay.visible{display:flex;}

.modal-backdrop{ position:fixed;inset:0;z-index:100; background:rgba(0,0,0,.6); display:none;justify-content:center;align-items:center; backdrop-filter:blur(3px); }
.modal-backdrop.visible{display:flex;}
.modal{ background:var(--color-surface); border-radius:var(--radius); padding:24px; max-width:480px; width:90%; box-shadow:var(--shadow); }

.rank-table{width:100%;border-collapse:collapse;font-size:13px; margin-top:10px;}
.rank-table th{padding:8px;border-bottom:2px solid var(--color-surface2);color:var(--color-muted);}
.rank-table td{padding:8px;border-bottom:1px solid var(--color-surface2);text-align:center;}
.rank-clear button{ margin-top:15px; padding:6px 14px; border:1px solid var(--color-danger); background:transparent; color:var(--color-danger); border-radius:var(--radius); cursor:pointer; }

@media(max-width:900px){
  #app{flex-direction:column;}
  .side-panel{width:100%; flex-direction:row; flex-wrap:wrap; border-left:none; border-top:2px solid var(--color-surface2);}
}
</style>
</head>
<body>
<div id="app">
  <div class="game-panel">
    <div class="game-area" id="gameArea">
      <div class="game-overlay"></div>
      <div class="status-bar" id="statusBar">
        <div class="stat">🏆<span class="val" id="scoreVal">0</span></div>
        <div class="stat">🔥<span class="val" id="comboVal">0</span></div>
        <div class="stat">💧<span class="lives-display" id="livesVal">♥♥♥♥♥</span></div>
        <div class="stat">⏱<span class="val" id="timeVal">0:00</span></div>
      </div>
      <div class="word-zone" id="wordZone"></div>
      <div class="start-overlay" id="startOverlay">
        <div style="font-size:32px; font-weight:900; color:var(--color-accent);">✝ 말씀 타이핑 ✝</div>
        <div style="color:var(--color-muted); margin-top:10px;">난이도를 선택하고 시작하세요</div>
      </div>
      <div class="pause-overlay" id="pauseOverlay"><div style="font-size:28px; color:var(--color-accent);">⏸ 일시정지</div></div>
    </div>
    <div class="input-bar">
      <input type="text" id="typingInput" placeholder="단어 입력 후 Enter ↵" disabled>
      <button class="btn-icon" id="btnSound">🔊</button>
    </div>
  </div>

  <div class="side-panel">
    <div class="side-header"><h1>말씀 타이핑</h1></div>
    <div class="diff-section">
      <button class="diff-btn active" data-level="kids"><span class="label">유년꿈터</span><span class="sub">가운데줄 위주</span></button>
      <button class="diff-btn" data-level="elem"><span class="label">초등꿈터</span><span class="sub">기본 단어</span></button>
      <button class="diff-btn" data-level="adult"><span class="label">교구국</span><span class="sub">최고 난이도</span></button>
    </div>
    <div class="ctrl-section">
      <button class="ctrl-btn start" id="btnStart">▶ 시작</button>
      <button class="ctrl-btn" id="btnPause" disabled style="background:var(--color-surface2); color:#fff;">⏸ 일시정지</button>
      <button class="ctrl-btn rank" id="btnRanking">🏅 랭킹</button>
    </div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal-backdrop" id="goModal">
  <div class="modal">
    <h2 style="text-align:center; color:var(--color-accent);">🙏 게임 종료</h2>
    <div id="goStats" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:20px 0;"></div>
    <input type="text" id="goNick" placeholder="닉네임을 입력하세요" style="width:100%; padding:10px; margin-bottom:15px; background:var(--color-bg); border:1px solid var(--color-surface2); color:#fff;">
    <div style="display:flex; gap:10px;">
      <button id="goSave" style="flex:1; padding:10px; background:var(--color-primary); color:#fff; border:none; border-radius:5px; cursor:pointer;">저장 & 랭킹</button>
      <button id="goSkip" style="flex:1; padding:10px; background:var(--color-surface2); color:#fff; border:none; border-radius:5px; cursor:pointer;">건너뛰기</button>
    </div>
  </div>
</div>

<!-- Ranking Modal -->
<div class="modal-backdrop" id="rkModal">
  <div class="modal" style="max-width:560px;">
    <h2 style="text-align:center; color:var(--color-accent);">🏅 랭킹</h2>
    <table class="rank-table">
      <thead><tr><th>순위</th><th>닉네임</th><th>점수</th><th>난이도</th></tr></thead>
      <tbody id="rkBody"></tbody>
    </table>
    <div class="rank-clear" style="text-align:center;"><button id="rkClear">🗑 랭킹 초기화 (관리자)</button></div>
    <button id="rkClose" style="width:100%; margin-top:15px; padding:10px; background:var(--color-surface2); color:#fff; border:none; border-radius:5px; cursor:pointer;">닫기</button>
  </div>
</div>

<script>
(() => {
  /* --- 관리자 설정 --- */
  const ADMIN_PASSWORD = "church1234"; // 랭킹 초기화 비밀번호

  const WORD_BANK = {
    kids: { normal: ['하나님','아멘','나라','노아','하늘','마음','인내','우리','노래'], bonus: ['하나님나라'] },
    elem: { normal: ['사랑','감사','기도','교회','믿음','소망','구원','찬양','성경'], bonus: ['예수님','신광교회'] },
    adult: { normal: ['예수그리스도','십자가','부활절','성령충만','사도행전','여호와이레','임마누엘'], bonus: ['이리신광교회','항상 기뻐하라'] }
  };

  const DIFF = {
    kids: { lives: 5, spawnInt: 2500, vy: -1.8, gravity: 0.02, score: 10, bonusChance: 0.1 },
    elem: { lives: 5, spawnInt: 2000, vy: -2.2, gravity: 0.03, score: 20, bonusChance: 0.12 },
    adult: { lives: 5, spawnInt: 1200, vy: -3.2, gravity: 0.04, score: 40, bonusChance: 0.15 }
  };

  let S = { 
    level: 'kids', running: false, paused: false, score: 0, combo: 0, lives: 5, 
    words: [], startTime: 0, elapsed: 0, animFrame: null, spawnTimer: null, lastFrame: 0 
  };

  const $ = s => document.querySelector(s);
  const wordZone = $('#wordZone'), typingInput = $('#typingInput');

  function spawnWord() {
    if (!S.running || S.paused) return;
    const cfg = DIFF[S.level], bank = WORD_BANK[S.level];
    const isBonus = Math.random() < cfg.bonusChance;
    const text = isBonus ? bank.bonus[0] : bank.normal[Math.floor(Math.random() * bank.normal.length)];
    
    const el = document.createElement('div');
    el.className = 'word-node' + (isBonus ? ' bonus' : '');
    el.textContent = text;
    wordZone.appendChild(el);

    const x = Math.random() * (wordZone.offsetWidth - 100);
    const y = wordZone.offsetHeight * 0.4;
    el.style.left = x + 'px';
    el.style.top = y + 'px';

    S.words.push({ el, text, x, y, vy: cfg.vy, vx: (Math.random() - 0.5) * 2, isBonus });
  }

  function gameLoop(ts) {
    if (!S.running || S.paused) { S.lastFrame = ts; S.animFrame = requestAnimationFrame(gameLoop); return; }
    const dt = (ts - S.lastFrame) / 16.6;
    S.lastFrame = ts;
    S.elapsed += dt * 16.6;

    const cfg = DIFF[S.level];
    for (let i = S.words.length - 1; i >= 0; i--) {
      const w = S.words[i];
      w.vy += cfg.gravity * dt;
      w.y += w.vy * dt;
      w.x += w.vx * dt;
      w.el.style.top = w.y + 'px';
      w.el.style.left = w.x + 'px';

      if (w.y > wordZone.offsetHeight) {
        wordZone.removeChild(w.el);
        S.words.splice(i, 1);
        S.lives--;
        S.combo = 0;
        updateUI();
        if (S.lives <= 0) endGame();
      }
    }
    updateUI();
    S.animFrame = requestAnimationFrame(gameLoop);
  }

  function updateUI() {
    $('#scoreVal').textContent = S.score;
    $('#comboVal').textContent = S.combo;
    $('#livesVal').textContent = '♥'.repeat(S.lives) + '♡'.repeat(DIFF[S.level].lives - S.lives);
    const sec = Math.floor(S.elapsed / 1000);
    $('#timeVal').textContent = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
  }

  function initGame() {
    S.running = true; S.score = 0; S.combo = 0; S.lives = DIFF[S.level].lives; S.elapsed = 0; S.words = [];
    wordZone.innerHTML = '';
    $('#startOverlay').classList.add('hidden');
    typingInput.disabled = false; typingInput.focus();
    $('#btnStart').disabled = true; $('#btnPause').disabled = false;
    S.lastFrame = performance.now();
    S.spawnTimer = setInterval(spawnWord, DIFF[S.level].spawnInt);
    S.animFrame = requestAnimationFrame(gameLoop);
  }

  function endGame() {
    S.running = false; clearInterval(S.spawnTimer); cancelAnimationFrame(S.animFrame);
    typingInput.disabled = true;
    $('#goStats').innerHTML = `<div>점수: ${S.score}</div><div>난이도: ${S.level}</div>`;
    $('#goModal').classList.add('visible');
  }

  /* --- 랭킹 시스템 --- */
  function saveRank(nick) {
    const ranks = JSON.parse(localStorage.getItem('church_ranks') || '[]');
    ranks.push({ nick, score: S.score, level: S.level, ts: Date.now() });
    ranks.sort((a,b) => b.score - a.score);
    localStorage.setItem('church_ranks', JSON.stringify(ranks.slice(0, 10)));
  }

  function showRanks() {
    const ranks = JSON.parse(localStorage.getItem('church_ranks') || '[]');
    $('#rkBody').innerHTML = ranks.map((r, i) => `<tr><td>${i+1}</td><td>${r.nick}</td><td>${r.score}</td><td>${r.level}</td></tr>`).join('');
    $('#rkModal').classList.add('visible');
  }

  /* --- 이벤트 바인딩 --- */
  $('#btnStart').onclick = initGame;
  $('#btnPause').onclick = () => { S.paused = !S.paused; $('#pauseOverlay').style.display = S.paused ? 'flex' : 'none'; };
  $('#btnRanking').onclick = showRanks;
  $('#rkClose').onclick = () => $('#rkModal').classList.remove('visible');
  
  // 랭킹 초기화 버튼 (관리자 전용)
  $('#rkClear').onclick = () => {
    const pw = prompt("관리자 비밀번호를 입력하세요:");
    if (pw === ADMIN_PASSWORD) {
      if (confirm("정말로 모든 랭킹을 초기화하시겠습니까?")) {
        localStorage.removeItem('church_ranks');
        alert("초기화되었습니다.");
        showRanks();
      }
    } else if (pw !== null) {
      alert("비밀번호가 틀렸습니다.");
    }
  };

  typingInput.onkeydown = e => {
    if (e.key === 'Enter') {
      const val = typingInput.value.trim();
      const idx = S.words.findIndex(w => w.text === val);
      if (idx > -1) {
        const w = S.words[idx];
        S.score += DIFF[S.level].score + (S.combo * 2);
        S.combo++;
        wordZone.removeChild(w.el);
        S.words.splice(idx, 1);
      } else { S.combo = 0; }
      typingInput.value = '';
      updateUI();
    }
  };

  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      S.level = btn.dataset.level;
    };
  });

  $('#goSave').onclick = () => { saveRank($('#goNick').value || '익명'); $('#goModal').classList.remove('visible'); showRanks(); $('#btnStart').disabled = false; };
  $('#goSkip').onclick = () => { $('#goModal').classList.remove('visible'); $('#btnStart').disabled = false; };
})();
</script>
</body>
</html>
