<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>✝ 말씀 타이핑 — 교회 타자연습</title>
<style>
/* ===== CSS Variables ===== */
:root{
  --color-bg:#0f0e17;
  --color-surface:#1a1932;
  --color-surface2:#252344;
  --color-primary:#e94560;
  --color-accent:#ffd700;
  --color-success:#2ecc71;
  --color-danger:#e74c3c;
  --color-text:#ececec;
  --color-muted:#8888aa;
  --radius:10px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
  --font-main:'Segoe UI','Malgun Gothic','맑은 고딕',sans-serif;
  --transition:all .25s ease;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-main);background:var(--color-bg);color:var(--color-text);}

/* ===== Layout ===== */
#app{
  display:flex;
  width:100%;height:100%;
  flex-direction:row;
}

/* --- Left: Game Panel --- */
.game-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  position:relative;
  min-width:0;
  height:100%;
}
.game-area{
  flex:1;
  position:relative;
  background:url('https://www.dropbox.com/scl/fi/5v49jobvr49qtognpngjb/background-church.png?rlkey=doov91nti27jnmito24hc2f21&st=450qi53g&raw=1') center center/cover no-repeat;
  overflow:hidden;
}
.game-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(15,14,23,.15) 0%,rgba(15,14,23,.35) 100%);
  pointer-events:none;z-index:1;
}
.word-zone{position:absolute;inset:0;z-index:2;}

/* Status bar overlaid on game area */
.status-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:center;gap:18px;
  padding:8px 12px;
  background:rgba(15,14,23,.7);
  backdrop-filter:blur(6px);
  z-index:10;
  font-size:14px;
  flex-wrap:wrap;
}
.stat{display:flex;align-items:center;gap:4px;}
.stat .icon{font-size:16px;}
.stat .val{font-weight:700;color:var(--color-accent);min-width:28px;text-align:center;}
.stat .lives-display{letter-spacing:2px;font-size:15px;}

/* Input bar at bottom of game panel */
.input-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  background:var(--color-surface);
  border-top:2px solid var(--color-surface2);
}
.input-bar input{
  flex:1;
  padding:10px 14px;
  border:2px solid var(--color-surface2);
  border-radius:var(--radius);
  background:var(--color-bg);
  color:var(--color-text);
  font-size:16px;
  outline:none;
  transition:var(--transition);
}
.input-bar input:focus{border-color:var(--color-primary);}
.input-bar input:disabled{opacity:.4;}
.btn-icon{
  width:40px;height:40px;
  border:none;border-radius:var(--radius);
  background:var(--color-surface2);
  color:var(--color-text);
  font-size:18px;cursor:pointer;
  transition:var(--transition);
  flex-shrink:0;
}
.btn-icon:hover{background:var(--color-primary);}

/* --- Right: Side Panel --- */
.side-panel{
  width:300px;
  display:flex;flex-direction:column;
  background:var(--color-surface);
  border-left:2px solid var(--color-surface2);
  height:100%;
  overflow-y:auto;
}
.side-header{
  padding:16px;text-align:center;
  background:var(--color-surface2);
}
.side-header h1{font-size:20px;color:var(--color-accent);}
.side-header .verse{font-size:12px;color:var(--color-muted);margin-top:4px;}

/* Difficulty selection */
.diff-section{padding:12px;}
.diff-section h3{font-size:13px;color:var(--color-muted);margin-bottom:8px;}
.diff-btn{
  display:block;width:100%;
  padding:10px;margin-bottom:6px;
  border:2px solid var(--color-surface2);
  border-radius:var(--radius);
  background:var(--color-bg);
  color:var(--color-text);
  cursor:pointer;text-align:left;
  transition:var(--transition);
}
.diff-btn .label{font-weight:700;font-size:14px;}
.diff-btn .sub{display:block;font-size:11px;color:var(--color-muted);margin-top:2px;}
.diff-btn.active{border-color:var(--color-primary);background:rgba(233,69,96,.15);}
.diff-btn:hover{border-color:var(--color-primary);}
.diff-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Control buttons */
.ctrl-section{padding:12px;display:flex;flex-direction:column;gap:8px;}
.ctrl-btn{
  padding:12px;border:none;border-radius:var(--radius);
  font-size:15px;font-weight:700;cursor:pointer;
  transition:var(--transition);
}
.ctrl-btn.start{background:var(--color-primary);color:#fff;}
.ctrl-btn.start:hover{background:#c73a52;}
.ctrl-btn.pause{background:var(--color-surface2);color:var(--color-text);}
.ctrl-btn.stop{background:var(--color-danger);color:#fff;}
.ctrl-btn.rank{background:var(--color-surface2);color:var(--color-accent);}
.ctrl-btn:disabled{opacity:.4;cursor:not-allowed;}

/* Verse banner in side panel */
.verse-banner{
  margin-top:auto;
  padding:12px;
  text-align:center;
  font-size:12px;
  color:var(--color-muted);
  border-top:1px solid var(--color-surface2);
}

/* ===== Word Nodes ===== */
.word-node{
  position:absolute;
  padding:4px 12px;
  border-radius:20px;
  font-weight:700;
  font-size:16px;
  white-space:nowrap;
  pointer-events:none;
  z-index:5;
  transition:opacity .15s;
  background:rgba(255,255,255,.92);
  color:#1a1932;
  box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.word-node.bonus{
  background:linear-gradient(135deg,#ffd700,#ffaa00);
  color:#1a1932;
  animation:glow 1s ease-in-out infinite alternate;
}
@keyframes glow{
  from{box-shadow:0 0 6px rgba(255,215,0,.6);}
  to{box-shadow:0 0 18px rgba(255,215,0,.9);}
}

/* Floating score */
.float-score{
  position:absolute;
  font-weight:900;font-size:18px;
  color:var(--color-accent);
  pointer-events:none;z-index:20;
  animation:floatUp .8s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-50px);}
}

/* Miss effect */
.miss-effect{
  position:absolute;font-size:24px;
  pointer-events:none;z-index:20;
  animation:floatUp .6s ease-out forwards;
}

/* Start overlay */
.start-overlay{
  position:absolute;inset:0;z-index:30;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:rgba(15,14,23,.75);
  backdrop-filter:blur(4px);
}
.start-overlay .big-text{font-size:32px;font-weight:900;color:var(--color-accent);text-shadow:0 2px 12px rgba(255,215,0,.5);}
.start-overlay .small-text{font-size:14px;color:var(--color-muted);margin-top:8px;}
.start-overlay.hidden{display:none;}

/* Pause overlay */
.pause-overlay{
  position:absolute;inset:0;z-index:30;
  display:none;flex-direction:column;
  justify-content:center;align-items:center;
  background:rgba(15,14,23,.7);
  backdrop-filter:blur(4px);
}
.pause-overlay.visible{display:flex;}
.pause-overlay .pause-text{font-size:28px;font-weight:900;color:var(--color-accent);}

/* ===== Modals ===== */
.modal-backdrop{
  position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,.6);
  display:none;justify-content:center;align-items:center;
  backdrop-filter:blur(3px);
}
.modal-backdrop.visible{display:flex;}
.modal{
  background:var(--color-surface);
  border-radius:var(--radius);
  padding:24px;
  max-width:480px;width:90%;
  max-height:85vh;overflow-y:auto;
  box-shadow:var(--shadow);
}
.modal h2{text-align:center;margin-bottom:16px;color:var(--color-accent);}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.modal-stat{
  background:var(--color-bg);padding:10px;border-radius:var(--radius);text-align:center;
}
.modal-stat .label{font-size:11px;color:var(--color-muted);}
.modal-stat .value{font-size:18px;font-weight:700;color:var(--color-accent);margin-top:2px;}
.modal-msg{text-align:center;font-size:14px;color:var(--color-muted);margin-bottom:16px;line-height:1.5;}
.modal input{
  width:100%;padding:10px;margin-bottom:12px;
  border:2px solid var(--color-surface2);border-radius:var(--radius);
  background:var(--color-bg);color:var(--color-text);font-size:15px;
  outline:none;
}
.modal input:focus{border-color:var(--color-primary);}
.modal-btns{display:flex;gap:8px;justify-content:center;}
.modal-btns button{
  padding:10px 20px;border:none;border-radius:var(--radius);
  font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);
}
.modal-btns .btn-primary{background:var(--color-primary);color:#fff;}
.modal-btns .btn-secondary{background:var(--color-surface2);color:var(--color-text);}

/* Ranking table */
.rank-filter{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;justify-content:center;}
.rank-filter button{
  padding:6px 12px;border:1px solid var(--color-surface2);border-radius:var(--radius);
  background:var(--color-bg);color:var(--color-text);font-size:12px;cursor:pointer;
  transition:var(--transition);
}
.rank-filter button.active{border-color:var(--color-primary);color:var(--color-primary);}
.rank-table{width:100%;border-collapse:collapse;font-size:13px;}
.rank-table th{padding:8px 4px;border-bottom:2px solid var(--color-surface2);color:var(--color-muted);font-weight:600;text-align:center;}
.rank-table td{padding:6px 4px;border-bottom:1px solid var(--color-surface2);text-align:center;}
.rank-table .medal{font-size:16px;}
.rank-clear{margin-top:12px;text-align:center;}
.rank-clear button{
  padding:6px 14px;border:1px solid var(--color-danger);border-radius:var(--radius);
  background:transparent;color:var(--color-danger);font-size:12px;cursor:pointer;
}

/* ===== Screen shake ===== */
@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}
.shake{animation:shake .3s ease;}

/* ===== Responsive: Tablet / Small screen ===== */
@media(max-width:900px){
  #app{flex-direction:column;}
  .game-panel{height:auto;flex:1;}
  .side-panel{
    width:100%;height:auto;
    border-left:none;border-top:2px solid var(--color-surface2);
    flex-direction:row;flex-wrap:wrap;
    overflow-y:visible;
  }
  .side-header{width:100%;padding:10px;}
  .side-header h1{font-size:16px;}
  .diff-section{
    display:flex;flex-wrap:wrap;gap:6px;padding:8px;width:100%;
  }
  .diff-section h3{width:100%;margin-bottom:4px;}
  .diff-btn{
    flex:1;min-width:100px;margin-bottom:0;padding:8px;text-align:center;
  }
  .ctrl-section{flex-direction:row;flex-wrap:wrap;padding:8px;width:100%;}
  .ctrl-btn{flex:1;min-width:80px;padding:10px;font-size:13px;}
  .verse-banner{width:100%;padding:8px;}
}

/* When game is running on small screen, hide side panel */
.game-running .side-panel{display:none;}
.game-running .game-panel{height:100%;}
.game-running #app{flex-direction:column;}

/* Very small (phone) */
@media(max-width:500px){
  .status-bar{font-size:12px;gap:10px;padding:6px 8px;}
  .word-node{font-size:14px;padding:3px 9px;}
  .input-bar input{font-size:14px;padding:8px 10px;}
}
</style>
</head>
<body>
<div id="app">
  <!-- LEFT: Game Panel -->
  <div class="game-panel">
    <div class="game-area" id="gameArea">
      <div class="game-overlay"></div>
      <div class="status-bar" id="statusBar">

        <div class="stat"><span class="icon">🔥</span><span>콤보</span><span class="val" id="comboVal">0</span></div>
        <div class="stat"><span class="icon">❌</span><span>미스</span><span class="val" id="missVal">0</span></div>
        <div class="stat"><span class="icon">💧</span><span class="lives-display" id="livesVal">♥♥♥♥♥</span></div>

      </div>

      </div>
      <div class="pause-overlay" id="pauseOverlay">
        <div class="pause-text">⏸ 일시정지</div>
      </div>
    </div>
    <div class="input-bar">
      <input type="text" id="typingInput" placeholder="단어 입력 후 Enter ↵" autocomplete="off" disabled>
      <button class="btn-icon" id="btnFullscreen" title="전체화면">⛶</button>
      <button class="btn-icon" id="btnSound" title="효과음">🔊</button>
    </div>
  </div>

  <!-- RIGHT: Side Panel -->
  <div class="side-panel" id="sidePanel">
    <div class="side-header">
      <h1>✝ 말씀 타이핑 ✝</h1>
      <p class="verse" id="headerVerse"></p>
    </div>
    <div class="diff-section">
      <h3>난이도 선택</h3>
      <button class="diff-btn active" data-level="kids"><span class="label">유년꿈터</span><span class="sub">가운데줄 · ★☆☆☆☆</span></button>
      <button class="diff-btn" data-level="elem"><span class="label">초등꿈터</span><span class="sub">Shift 없음 · ★★☆☆☆</span></button>
      <button class="diff-btn" data-level="junior"><span class="label">소년꿈터</span><span class="sub">Shift 포함 · ★★★☆☆</span></button>
      <button class="diff-btn" data-level="youth"><span class="label">청소년부</span><span class="sub">빠른 속도 · ★★★★☆</span></button>
      <button class="diff-btn" data-level="adult"><span class="label">교구국</span><span class="sub">최고 난이도 · ★★★★★</span></button>
    </div>
    <div class="ctrl-section">
      <button class="ctrl-btn start" id="btnStart">▶ 시작</button>
      <button class="ctrl-btn pause" id="btnPause" disabled>⏸ 일시정지</button>
      <button class="ctrl-btn stop" id="btnStop" disabled>■ 중지</button>
      <button class="ctrl-btn rank" id="btnRanking">🏅 랭킹</button>
    </div>
    <div class="verse-banner" id="verseBanner"></div>
  </div>
</div>

<!-- Game Over Modal -->
<div class="modal-backdrop" id="goModal">
  <div class="modal">
    <h2>🙏 게임 종료</h2>
    <div class="modal-stats" id="goStats"></div>
    <div class="modal-msg" id="goMsg"></div>
    <input type="text" id="goNick" placeholder="닉네임을 입력하세요" maxlength="12">
    <div class="modal-btns">
      <button class="btn-primary" id="goSave">💾 저장 & 랭킹보기</button>
      <button class="btn-secondary" id="goSkip">건너뛰기</button>
    </div>
  </div>
</div>

<!-- Ranking Modal -->
<div class="modal-backdrop" id="rkModal">
  <div class="modal" style="max-width:560px;">
    <h2>🏅 랭킹</h2>
    <div class="rank-filter" id="rkFilter"></div>
    <table class="rank-table">
      <thead><tr><th>#</th><th>닉네임</th><th>점수</th><th>콤보</th><th>정확도</th><th>난이도</th></tr></thead>
      <tbody id="rkBody"></tbody>
    </table>
    <div class="rank-clear"><button id="rkClear">🗑 랭킹 초기화</button></div>
    <div class="modal-btns" style="margin-top:12px;">
      <button class="btn-secondary" id="rkClose">닫기</button>
    </div>
  </div>
</div>

/* ===== Audio (Web Audio API) ===== */
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, dur, type, vol){
  if(!S.soundEnabled) return;
  try{
    const ctx = getAudio();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type || 'sine';
    o.frequency.value = freq;
    g.gain.value = vol || 0.12;
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + dur);
  }catch(e){}
}
function sndMatch(){ playTone(880, 0.12, 'sine', 0.15); setTimeout(()=>playTone(1100, 0.1, 'sine', 0.1), 60); }
function sndBonus(){ playTone(1200, 0.15, 'sine', 0.18); setTimeout(()=>playTone(1500, 0.15, 'sine', 0.15), 80); setTimeout(()=>playTone(1800, 0.2, 'sine', 0.12), 160); }
function sndMiss(){ playTone(220, 0.25, 'sawtooth', 0.1); }
function sndGameOver(){ playTone(440, 0.3, 'sine', 0.15); setTimeout(()=>playTone(330, 0.3, 'sine', 0.12), 200); setTimeout(()=>playTone(220, 0.5, 'sine', 0.1), 400); }

/* ===== Helpers ===== */
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function rand(a,b){ return Math.random()*(b-a)+a; }
function fmtTime(ms){
  const s = Math.floor(ms/1000);
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

/* ===== Spawn Word ===== */
function spawnWord(){
  if(!S.running || S.paused) return;
  const cfg = DIFF[S.level];
  const bank = WORD_BANK[S.level];
  if(!bank || !bank.normal || bank.normal.length === 0) return;

  const isBonus = Math.random() < cfg.bonusChance && bank.bonus && bank.bonus.length > 0;
  const text = isBonus ? pick(bank.bonus) : pick(bank.normal);

  const areaW = wordZone.offsetWidth;
  const areaH = wordZone.offsetHeight;
  if(areaW === 0 || areaH === 0) return;

/* Spawn from pastor's mouth — fixed origin point */
const spawnX = areaW * 0.5;
const spawnY = areaH * 0.43;

  const el = document.createElement('div');
  el.className = 'word-node' + (isBonus ? ' bonus' : '');
  el.textContent = text;
  wordZone.appendChild(el);

  /* Measure width, clamp x */
const elW = el.offsetWidth;
const x = spawnX - elW / 2;

  el.style.left = x + 'px';
  el.style.top = spawnY + 'px';

  const vx = rand(-cfg.vxRange, cfg.vxRange);
  const vy = cfg.initVy * rand(0.85, 1.15);

  S.words.push({
    id: S.nextId++,
    text, el, isBonus,
    x, y: spawnY, vx, vy,
    width: elW
  });
}

/* ===== Remove Word ===== */
function removeWord(w, reason){
  if(w.el && w.el.parentNode) w.el.parentNode.removeChild(w.el);
  S.words = S.words.filter(ww => ww.id !== w.id);
  if(reason === 'matched'){
    S.wordsCleared++;
    if(w.isBonus) S.bonusCleared++;
  }
}

/* ===== Game Loop (delta time based) ===== */
function gameLoop(ts){
  if(!S.running){ S.animFrame = null; return; }
  if(S.paused){ S.lastFrame = ts; S.animFrame = requestAnimationFrame(gameLoop); return; }

  let dt = (ts - S.lastFrame) / 16.667;
  S.lastFrame = ts;
  if(dt > 3) dt = 3;
  if(dt < 0) dt = 0;

  S.elapsed = ts - S.startTime - S.pausedTotal;
  const cfg = DIFF[S.level];
  S.speedMul = Math.min(cfg.maxSpeedMul, 1 + (S.elapsed/1000) * cfg.speedUp);

  const areaW = wordZone.offsetWidth;
  const areaH = wordZone.offsetHeight;

  for(let i = S.words.length - 1; i >= 0; i--){
    const w = S.words[i];
    w.vy += cfg.gravity * S.speedMul * dt;
    w.y += w.vy * dt;
    w.x += w.vx * dt;

    if(w.x < 0){ w.x = 0; w.vx = Math.abs(w.vx); }
    if(w.x + w.width > areaW){ w.x = areaW - w.width; w.vx = -Math.abs(w.vx); }

    w.el.style.left = w.x + 'px';
    w.el.style.top = w.y + 'px';

    if(w.y > areaH){
      showMissEffect(w.x, areaH - 30);
      removeWord(w, 'missed');
      S.combo = 0;
      S.misses++;
      S.lives--;
      sndMiss();
      shakeScreen();
      updateUI();
      if(S.lives <= 0){ endGame(); return; }
    }
  }

  updateUI();
  S.animFrame = requestAnimationFrame(gameLoop);
}

/* ===== Input Handling (Enter only) ===== */
function onInput(){
  const v = typingInput.value.trim();
  S.totalTyped++;
  if(!v){ typingInput.value = ''; return; }

  let matched = null;
  for(const w of S.words){
    if(w.text === v && (!matched || w.y > matched.y)) matched = w;
  }

  if(matched){
    S.correctTyped++;
    S.combo++;
    if(S.combo > S.maxCombo) S.maxCombo = S.combo;
    const cfg = DIFF[S.level];
    const comboMul = 1 + Math.floor(S.combo / 5) * 0.5;
    let pts = Math.round(cfg.baseScore * comboMul);
    if(matched.isBonus){ pts *= cfg.bonusMul; sndBonus(); }
    else { sndMatch(); }
    S.score += pts;
    showFloat(matched.x, matched.y, '+' + pts, matched.isBonus ? '#ffd700' : '#2ecc71');
    removeWord(matched, 'matched');
  } else {
    S.combo = 0;
  }

  typingInput.value = '';
  updateUI();
}

/* ===== Countdown ===== */
function startCountdown(cb){
  const overlay = startOverlay;
  overlay.classList.remove('hidden');
  let count = 3;
  overlay.querySelector('.big-text').textContent = count;
  overlay.querySelector('.small-text').textContent = '준비하세요!';
  typingInput.disabled = true;

  const timer = setInterval(()=>{
    count--;
    if(count > 0){
      overlay.querySelector('.big-text').textContent = count;
      playTone(660, 0.1, 'sine', 0.1);
    } else if(count === 0){
      overlay.querySelector('.big-text').textContent = '시작!';
      playTone(880, 0.15, 'sine', 0.15);
    } else {
      clearInterval(timer);
      overlay.classList.add('hidden');
      cb();
    }
  }, 800);
}

/* ===== Game Init ===== */
function initGame(){
  if(S.running) stopGame();

  const cfg = DIFF[S.level];
  S.running = false; S.paused = false;
  S.score = 0; S.combo = 0; S.maxCombo = 0; S.misses = 0;
  S.lives = cfg.lives; S.maxLives = cfg.lives;
  S.wordsCleared = 0; S.bonusCleared = 0;
  S.totalTyped = 0; S.correctTyped = 0;
  S.words = []; S.nextId = 0; S.speedMul = 1;
  S.elapsed = 0; S.pausedTotal = 0; S.lastFrame = 0;

  wordZone.innerHTML = '';
  pauseOverlay.classList.remove('visible');
  typingInput.value = '';

  document.body.classList.add('game-running');
  btnStart.disabled = true;
  btnPause.disabled = true;
  btnStop.disabled = true;

  $$('.diff-btn').forEach(b => b.disabled = true);
  updateUI();

  startCountdown(()=>{
    S.running = true;
    S.startTime = performance.now();
    S.lastFrame = S.startTime;
    typingInput.disabled = false;
    typingInput.focus();
    btnPause.disabled = false;
    btnStop.disabled = false;

    S.spawnTimer = setInterval(spawnWord, cfg.spawnInt);
    spawnWord();
    S.animFrame = requestAnimationFrame(gameLoop);
  });
}


/* ===== Pause ===== */
function pauseGame(){
  if(!S.running) return;
  if(!S.paused){
    S.paused = true;
    S.pauseStart = performance.now();
    pauseOverlay.classList.add('visible');
    typingInput.disabled = true;
    btnPause.textContent = '▶ 계속';
} else {
    S.pausedTotal += performance.now() - S.pauseStart;
    S.paused = false;
    S.lastFrame = performance.now();
    pauseOverlay.classList.remove('visible');
    typingInput.disabled = false;
    typingInput.focus();
    btnPause.textContent = '⏸ 일시정지';
  }
}

/* ===== Stop ===== */
function stopGame(){
  S.running = false; S.paused = false;
  if(S.spawnTimer){ clearInterval(S.spawnTimer); S.spawnTimer = null; }
  if(S.animFrame){ cancelAnimationFrame(S.animFrame); S.animFrame = null; }
  wordZone.innerHTML = '';
  S.words = [];
  startOverlay.classList.remove('hidden');
  pauseOverlay.classList.remove('visible');
  typingInput.disabled = true; typingInput.value = '';
  document.body.classList.remove('game-running');
  btnStart.disabled = false;
  btnPause.disabled = true; btnPause.textContent = '⏸ 일시정지';
  btnStop.disabled = true;

  $$('.diff-btn').forEach(b => b.disabled = false);
  updateUI();
}

/* ===== End Game ===== */
function endGame(){
  S.running = false; S.paused = false;
  if(S.spawnTimer){ clearInterval(S.spawnTimer); S.spawnTimer = null; }
  if(S.animFrame){ cancelAnimationFrame(S.animFrame); S.animFrame = null; }
  typingInput.disabled = true;
  sndGameOver();

  const acc = S.totalTyped > 0 ? Math.round((S.correctTyped / S.totalTyped) * 100) : 0;
  const secs = Math.max(1, S.elapsed / 1000);
  const wpm = Math.round((S.wordsCleared / secs) * 60);

  goStats.innerHTML = `
    <div class="modal-stat"><div class="label">점수</div><div class="value">${S.score}</div></div>
    <div class="modal-stat"><div class="label">난이도</div><div class="value">${LEVEL_LABELS[S.level]}</div></div>
    <div class="modal-stat"><div class="label">시간</div><div class="value">${fmtTime(S.elapsed)}</div></div>
    <div class="modal-stat"><div class="label">처리 단어</div><div class="value">${S.wordsCleared}</div></div>
    <div class="modal-stat"><div class="label">보너스</div><div class="value">${S.bonusCleared}</div></div>
    <div class="modal-stat"><div class="label">최대 콤보</div><div class="value">${S.maxCombo}</div></div>
    <div class="modal-stat"><div class="label">정확도</div><div class="value">${acc}%</div></div>
    <div class="modal-stat"><div class="label">WPM</div><div class="value">${wpm}</div></div>
  `;

  let msg = '';
  if(S.score >= 500) msg = '🌟 놀라운 실력입니다! 하나님께서 기뻐하십니다!';
  else if(S.score >= 300) msg = '👏 잘하셨습니다! 말씀으로 무장하고 계시네요!';
  else if(S.score >= 100) msg = '💪 좋은 시작입니다! 계속 연습하세요!';
  else msg = '🙏 포기하지 마세요! 다시 도전해보세요!';
  goMsg.textContent = msg;

  goNick.value = '';
  goModal.classList.add('visible');
}

/* ===== Rankings ===== */
const RK_KEY = 'church_typing_rankings';

function loadLocalRanks(){
  try{ return JSON.parse(localStorage.getItem(RK_KEY)) || {}; }
  catch(e){ return {}; }
}
function saveLocalRanks(data){
  try{ localStorage.setItem(RK_KEY, JSON.stringify(data)); }catch(e){}
}

async function fbPush(level, entry){
  if(!useFirebase) return;
  try{
    await fetch(`${FIREBASE_DB_URL}/rankings/${level}.json`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(entry)
    });
  }catch(e){ console.warn('Firebase push failed:', e); }
}

async function fbGet(level){
  if(!useFirebase) return [];
  try{
    const r = await fetch(`${FIREBASE_DB_URL}/rankings/${level}.json`);
    const d = await r.json();
    if(!d) return [];
    return Object.values(d);
  }catch(e){ console.warn('Firebase get failed:', e); return []; }
}

async function saveRank(nick){
  const entry = {
    nick,
    score: S.score,
    level: S.level,
    words: S.wordsCleared,
    combo: S.maxCombo,
    accuracy: S.totalTyped > 0 ? Math.round((S.correctTyped/S.totalTyped)*100) : 0,
    time: fmtTime(S.elapsed),
    ts: Date.now()
  };

  /* Local */
  const local = loadLocalRanks();
  if(!local[S.level]) local[S.level] = [];
  local[S.level].push(entry);
  local[S.level].sort((a,b)=>b.score-a.score);
  local[S.level] = local[S.level].slice(0,10);
  saveLocalRanks(local);

  /* Firebase */
  await fbPush(S.level, entry);
}

async function getRanks(level){
  const local = loadLocalRanks();
  const localList = local[level] || [];

  if(useFirebase){
    const fbList = await fbGet(level);
    const merged = [...localList, ...fbList];
    /* Dedupe by ts */
    const seen = new Set();
    const unique = merged.filter(e => {
      if(seen.has(e.ts)) return false;
      seen.add(e.ts); return true;
    });
    unique.sort((a,b)=>b.score-a.score);
    return unique.slice(0,10);
  }
  return localList;
}

async function showRankingModal(filterLevel){
  const levels = ['kids','elem','junior','youth','adult'];

  /* Build filter buttons */
  rkFilter.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.textContent = '전체';
  allBtn.className = filterLevel === 'all' ? 'active' : '';
  allBtn.addEventListener('click', ()=> showRankingModal('all'));
  rkFilter.appendChild(allBtn);

  for(const lv of levels){
    const btn = document.createElement('button');
    btn.textContent = LEVEL_LABELS[lv];
    btn.className = filterLevel === lv ? 'active' : '';
    btn.addEventListener('click', ()=> showRankingModal(lv));
    rkFilter.appendChild(btn);
  }

  /* Gather data */
  let list = [];
  if(filterLevel === 'all'){
    for(const lv of levels){
      const items = await getRanks(lv);
      list.push(...items);
    }
    list.sort((a,b)=>b.score-a.score);
    list = list.slice(0,20);
  } else {
    list = await getRanks(filterLevel);
  }

  /* Build table */
  rkBody.innerHTML = '';
  if(list.length === 0){
    rkBody.innerHTML = '<tr><td colspan="6" style="padding:20px;color:var(--color-muted);">기록이 없습니다</td></tr>';
  } else {
    list.forEach((e, i) => {
      const medal = i===0 ? '🥇' : i===1 ? '🥈' : i===2 ? '🥉' : (i+1);
      const tr = document.createElement('tr');
      tr.innerHTML = `<td class="medal">${medal}</td><td>${e.nick||'익명'}</td><td style="font-weight:700;color:var(--color-accent)">${e.score}</td><td>${e.combo||0}</td><td>${e.accuracy||0}%</td><td>${LEVEL_LABELS[e.level]||e.level}</td>`;
      rkBody.appendChild(tr);
    });
  }

  rkModal.classList.add('visible');
}

/* ===== Event Bindings ===== */

/* Difficulty selection */

$$('.diff-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    if(btn.disabled) return;
    S.level = btn.dataset.level;
    updateDiffBtns();
  });
});

/* Game controls */
btnStart.addEventListener('click', initGame);
btnPause.addEventListener('click', pauseGame);
btnStop.addEventListener('click', stopGame);
btnRanking.addEventListener('click', ()=> showRankingModal('all'));

/* Input: Enter only */
typingInput.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    e.preventDefault();
    if(S.running && !S.paused) onInput();
  }
  if(e.key === 'Escape'){
    typingInput.value = '';
  }
});

/* Fullscreen */
btnFullscreen.addEventListener('click', ()=>{
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
});
document.addEventListener('keydown', e => {
  if(e.key === 'f' && !S.running && document.activeElement !== typingInput){
    if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
    else document.exitFullscreen().catch(()=>{});
  }
});

/* Sound toggle */
btnSound.addEventListener('click', ()=>{
  S.soundEnabled = !S.soundEnabled;
  btnSound.textContent = S.soundEnabled ? '🔊' : '🔇';
});

/* Game Over modal */
goSave.addEventListener('click', async ()=>{
  const nick = goNick.value.trim() || '익명';
  await saveRank(nick);
  goModal.classList.remove('visible');
  /* Cleanup game state and show ranking */
  wordZone.innerHTML = '';
  S.words = [];
  startOverlay.classList.remove('hidden');
  document.body.classList.remove('game-running');
  btnStart.disabled = false;
  btnPause.disabled = true; btnPause.textContent = '⏸ 일시정지';
  btnStop.disabled = true;

  $$('.diff-btn').forEach(b => b.disabled = false);
  await showRankingModal(S.level);
});

goSkip.addEventListener('click', ()=>{
  goModal.classList.remove('visible');
  wordZone.innerHTML = '';
  S.words = [];
  startOverlay.classList.remove('hidden');
  document.body.classList.remove('game-running');
  btnStart.disabled = false;
  btnPause.disabled = true; btnPause.textContent = '⏸ 일시정지';
  btnStop.disabled = true;

  $$('.diff-btn').forEach(b => b.disabled = false);
});

/* Ranking modal */
rkClose.addEventListener('click', ()=> rkModal.classList.remove('visible'));
rkClear.addEventListener('click', ()=>{
  if(confirm('모든 랭킹 데이터를 삭제하시겠습니까?')){
    localStorage.removeItem(RK_KEY);
    showRankingModal('all');
  }
});

/* Close modals on backdrop click */
goModal.addEventListener('click', e => { if(e.target === goModal){ /* do nothing, require button */ } });
rkModal.addEventListener('click', e => { if(e.target === rkModal) rkModal.classList.remove('visible'); });

/* Escape closes modals */
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    if(rkModal.classList.contains('visible')) rkModal.classList.remove('visible');
    if(S.running && !S.paused) typingInput.focus();
  }
});

/* Initial state */
updateUI();
updateDiffBtns();

})();
</script>
</body>
</html>
